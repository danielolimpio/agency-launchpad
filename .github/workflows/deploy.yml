name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Limpar saídas antigas
        run: rm -rf dist .output node_modules/.vite

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Build do projeto
        run: npm run build

      - name: Exportar site estático
        run: node scripts/static-export.mjs

      - name: Mostrar arquivos gerados
        run: |
          echo "== dist/client =="
          ls -la dist/client || true

      - name: Deploy FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/client/
          server-dir: /
          dangerous-clean-slate: true
          dry-run: false
          log-level: verbose
